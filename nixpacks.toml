[phases.setup]
nixPkgs = ["python312", "gcc", "zlib", "libjpeg", "freetype"]
providers = ["python"]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["echo 'Python API build complete'"]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[variables]
PYTHONUNBUFFERED = "1"
