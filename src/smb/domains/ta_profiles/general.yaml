therapeutic_area: general
visit_structure: fixed_duration

section_extraction:
  treatment_regimen:
    search_sections: ["6", "6.1"]
    search_keywords: ["dose", "treatment", "intervention"]
    extract:
      - field: treatment_duration
        patterns: ["(\\d+)\\s*(?:weeks?|months?) treatment", "treatment period.{0,20}(\\d+)"]
      - field: total_doses
        patterns: ["(\\d+)\\s*(?:doses?|injections?)"]

  population_subsets:
    search_sections: ["5", "8"]
    extract:
      - field: pk_subset
        patterns: ["pharmacokinetic.{0,20}(\\d+)\\s*participant"]

  study_design:
    search_sections: ["1", "4"]
    search_keywords: ["synopsis", "design", "overview"]

inference_defaults:
  screen_failure_rate: 0.25
  early_discontinuation_rate: 0.15
